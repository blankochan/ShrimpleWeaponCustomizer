name: Build on push
on:
  push:
    paths:
      - "**/*.cs"
      - "*.csproj"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download Networking API
        run: |
          gh release download --repo blankochan/ShrimpleNetworkingAPI --pattern ShrimpleNetworkingAPI.dll
          mkdir lib
          mv ShrimpleNetworkingAPI.dll lib/
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Build
        uses: blankochan/ShrimpleBuilder/build@master
        with:
          configuration: "Debug"
          include_networking_api: true
          download_url: ${{ secrets.REFERENCE_URL }}
